name: Update Weather Data

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'generate_data.py'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Note: generate_data.py only needs 'requests' which is in requirements.txt
      - name: Run data generation script
        env:
          METEOSERVER_API_KEY: ${{ secrets.METEOSERVER_API_KEY }}
        run: python generate_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update weather data [skip ci]"
          git push
